services:
  ingestion:
    build:
      context: ./ingestion
    container_name: lp-ingestion
    depends_on:
      - kafka
      - kafka-rest
    environment:
      - LISTEN_ADDR=:8082
      - OPENAQ_URL=https://api.openaq.org/v3
      - OPENAQ_API_KEY=${OPENAQ_API_KEY:-}
      - OPENAQ_COUNTRY_ID=111
      - OPENAQ_LOCATION_LIMIT=3
      - OPENAQ_CITY=Bangkok
      - OPENAQ_COUNTRY=TH
      - KAFKA_REST_URL=http://kafka-rest:8082
      - KAFKA_TOPIC=openaq.th.latest
      - POLL_INTERVAL=1h
      - HTTP_TIMEOUT=20s
      - MAX_RETRIES=5
      - INITIAL_BACKOFF=2s
    ports:
      - "8082:8082"
    networks:
      - lakehouse
    restart: unless-stopped

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: lp-namenode
    env_file:
      - ./hadoop.env
    environment:
      - CLUSTER_NAME=lakehouse-pulse
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: lp-datanode
    env_file:
      - ./hadoop.env
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SERVICE_PRECONDITION=namenode:9870
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - lakehouse
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: lp-zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    ports:
      - "2181:2181"
    networks:
      - lakehouse
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: lp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    networks:
      - lakehouse
    restart: unless-stopped

  kafka-rest:
    image: confluentinc/cp-kafka-rest:7.6.1
    container_name: lp-kafka-rest
    depends_on:
      - kafka
    environment:
      - KAFKA_REST_HOST_NAME=kafka-rest
      - KAFKA_REST_LISTENERS=http://0.0.0.0:8082
      - KAFKA_REST_BOOTSTRAP_SERVERS=PLAINTEXT://kafka:29092
    ports:
      - "8083:8082"
    networks:
      - lakehouse
    restart: unless-stopped

  spark-master:
    image: apache/spark:3.5.3
    container_name: lp-spark-master
    environment:
      - SPARK_MASTER_OPTS=-Dspark.master.rest.enabled=true
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "8080:8080"
      - "7077:7077"
      - "6066:6066"
    volumes:
      - ./spark-jobs:/opt/spark/jobs
    networks:
      - lakehouse
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.3
    container_name: lp-spark-worker
    depends_on:
      - spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
      - --cores
      - "2"
      - --memory
      - 2g
    ports:
      - "8081:8081"
    networks:
      - lakehouse
    restart: unless-stopped

  spark-transform:
    image: apache/spark:3.5.3
    container_name: lp-spark-transform
    depends_on:
      - spark-master
      - kafka
      - namenode
      - hive-metastore
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC=openaq.th.latest
      - KAFKA_STARTING_OFFSETS=latest
      - KAFKA_MAX_OFFSETS_PER_TRIGGER=5000
      - HDFS_DEFAULT_FS=hdfs://namenode:9000
      - HIVE_METASTORE_URI=thrift://hive-metastore:9083
      - HIVE_WAREHOUSE_DIR=hdfs://namenode:9000/user/hive/warehouse
      - HDFS_RAW_PATH=hdfs://namenode:9000/lakehouse/raw/air_quality
      - HDFS_PROCESSED_PATH=hdfs://namenode:9000/lakehouse/processed/air_quality
      - HDFS_CURATED_PATH=hdfs://namenode:9000/lakehouse/curated/air_quality
      - SPARK_CHECKPOINT_PATH=hdfs://namenode:9000/lakehouse/checkpoints/air_quality_transform
      - HIVE_DATABASE=lakehouse_pulse
      - HIVE_TABLE=air_quality_curated
      - SPARK_JOB_INTERVAL_SECONDS=3600
    entrypoint:
      - /bin/bash
      - /opt/spark/jobs/run-transform.sh
    volumes:
      - ./spark-jobs:/opt/spark/jobs
    networks:
      - lakehouse
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: lp-postgres
    environment:
      - POSTGRES_DB=metastore
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hive
      - POSTGRES_INITDB_ARGS=--auth-host=md5 --auth-local=trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lakehouse
    restart: unless-stopped

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: lp-hive-metastore
    depends_on:
      postgres:
        condition: service_started
      namenode:
        condition: service_started
      hive-metastore-init:
        condition: service_completed_successfully
    environment:
      - SERVICE_PRECONDITION=namenode:9870 postgres:5432
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    command: /opt/hive/bin/hive --service metastore
    volumes:
      - ./hive/conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
    ports:
      - "9083:9083"
    networks:
      - lakehouse
    restart: unless-stopped

  hive-metastore-init:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: lp-hive-metastore-init
    depends_on:
      - postgres
      - namenode
    environment:
      - SERVICE_PRECONDITION=namenode:9870 postgres:5432
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    entrypoint:
      - /bin/bash
      - -lc
      - >
        /opt/hive/bin/schematool -dbType postgres
        -url jdbc:postgresql://postgres:5432/metastore
        -driver org.postgresql.Driver
        -userName hive
        -passWord hive
        -info >/dev/null 2>&1
        || /opt/hive/bin/schematool -dbType postgres
        -url jdbc:postgresql://postgres:5432/metastore
        -driver org.postgresql.Driver
        -userName hive
        -passWord hive
        -initSchema
    volumes:
      - ./hive/conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
    networks:
      - lakehouse
    restart: "no"

  hive-server2:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: lp-hive-server2
    depends_on:
      - hive-metastore
    environment:
      - SERVICE_PRECONDITION=hive-metastore:9083
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    command: /opt/hive/bin/hive --service hiveserver2
    volumes:
      - ./hive/conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
    ports:
      - "10000:10000"
      - "10002:10002"
    networks:
      - lakehouse
    restart: unless-stopped

  hive-query-api:
    build:
      context: ./hive-query-api
    container_name: lp-hive-query-api
    depends_on:
      - hive-server2
    environment:
      - HIVE_HOST=hive-server2
      - HIVE_PORT=10000
      - HIVE_USERNAME=root
      - HIVE_DATABASE=default
      - HIVE_QUERY_TIMEOUT_SECONDS=30
      - HIVE_MAX_ROWS=500
      - HIVE_READ_ONLY=true
    ports:
      - "8085:8085"
    networks:
      - lakehouse
    restart: unless-stopped

  mcp-server:
    build:
      context: ./mcp-server
    container_name: lp-mcp-server
    depends_on:
      - hive-query-api
      - hive-server2
      - spark-master
      - prometheus
      - ingestion
    environment:
      - MCP_LISTEN_ADDR=:8084
      - MCP_TOOL_TIMEOUT=15s
      - OPENAQ_URL=https://api.openaq.org/v3
      - OPENAQ_API_KEY=${OPENAQ_API_KEY:-}
      - OPENAQ_COUNTRY_ID=111
      - OPENAQ_LOCATION_LIMIT=3
      - OPENAQ_COUNTRY=TH
      - PROMETHEUS_URL=http://prometheus:9090
      - KAFKA_LAG_PROMQL=max(lakehouse_pulse_ingestion_consecutive_failures)
      - NAMENODE_JMX_URL=http://namenode:9870/jmx
      - SPARK_MASTER_UI_URL=http://spark-master:8080
      - SPARK_SUBMIT_URL=http://spark-master:6066/v1/submissions/create
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_PYTHON_JOB=file:/opt/spark/jobs/transform.py
      - HIVE_QUERY_API_URL=http://hive-query-api:8085/query
    ports:
      - "8084:8084"
    volumes:
      - ./spark-jobs:/opt/spark/jobs:ro
    networks:
      - lakehouse
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: lp-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    networks:
      - lakehouse
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: lp-grafana
    depends_on:
      - ingestion
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_DEFAULT_THEME=light
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - lakehouse
    restart: unless-stopped

networks:
  lakehouse:
    name: lakehouse-pulse

volumes:
  namenode_data:
  datanode_data:
  postgres_data:
  prometheus_data:
  grafana_data:
