global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/lakehouse-alerts.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "ingestion"
    metrics_path: /metrics
    static_configs:
      - targets: ["ingestion:8082"]

  - job_name: "mcp-server"
    metrics_path: /metrics
    static_configs:
      - targets: ["mcp-server:8084"]

  - job_name: "spark-master"
    static_configs:
      - targets: ["spark-master:8080"]

  - job_name: "hdfs-namenode"
    metrics_path: /jmx
    static_configs:
      - targets: ["namenode:9870"]
